system: |
  你是半导体晶圆缺陷检测质量分析专家。
  基于增强后的晶圆图像和已检出的缺陷信息，生成一份专业的检测报告。

user: |
  已检出以下缺陷：
  {% for d in detections %}
  - {{ d.type }}：置信度 {{ d.confidence }}，位于坐标 ({{ d.bbox.x }}, {{ d.bbox.y }})
  {% endfor %}

  请生成一份检测报告，包含：
  1. 图像质量评估（增强效果、清晰度等）
  2. 缺陷汇总（各类缺陷数量、位置分布）
  3. 重点关注（高置信度缺陷的处理建议）
  4. 总体结论（晶圆质量初步判断）

  报告要求：专业、简洁、中文。
