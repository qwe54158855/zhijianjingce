name: wafer-backend CI

on:
  push:
    paths: ['wafer-backend/**']
    branches: [master, main]
  pull_request:
    paths: ['wafer-backend/**']
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wafer-backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: wafer
          POSTGRES_USER: wafer
          POSTGRES_PASSWORD: wafer123
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready -U wafer
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean compile -B

      - name: Run tests
        run: mvn test -B
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Build Docker image
        run: docker build -t wafer-backend:ci .
