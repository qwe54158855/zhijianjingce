name: wafer-lora-service CI

on:
  push:
    paths: ['wafer-lora-service/**']
    branches: [master, main]
  pull_request:
    paths: ['wafer-lora-service/**']
    branches: [master, main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wafer-lora-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r requirements.txt --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Lint with flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Test imports
        run: |
          python -c "from core.config import settings; print('config OK')"
          python -c "from models.infer_schemas import InferRequest; print('schemas OK')"
          python -c "import sys; sys.path.insert(0,'.'); from training.train_lora import WaferPairDataset; print('training OK')"

      - name: Build Docker image
        run: docker build -t wafer-lora-service:ci .
