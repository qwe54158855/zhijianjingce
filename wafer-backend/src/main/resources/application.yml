server:
  port: 8080

spring:
  application:
    name: wafer-backend
  profiles:
    active: dev-h2
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:wafer}
    username: ${DB_USER:wafer}
    password: ${DB_PASSWORD:wafer123}
    hikari:
      maximum-pool-size: 20

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: wafer-images

lora:
  service:
    url: ${LORA_SERVICE_URL:http://localhost:8000}

app:
  async:
    core-pool-size: 4
    max-pool-size: 8
    queue-capacity: 100

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
      base-path: /api/v1/actuator
  metrics:
    tags:
      application: wafer-backend
    export:
      prometheus:
        enabled: true
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
    metrics:
      enabled: true
    prometheus:
      enabled: true

qwen:
  service:
    url: http://wafer-qwen-service:8001
