version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: wafer
      POSTGRES_USER: wafer
      POSTGRES_PASSWORD: wafer123
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wafer"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  spring-api:
    build: ./wafer-backend
    ports: ["8080:8080"]
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: wafer
      DB_USER: wafer
      DB_PASSWORD: wafer123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      LORA_SERVICE_URL: http://lora-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports: ["80:80"]
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - spring-api

  lora-service:
    build: ./wafer-lora-service
    ports: ["8000:8000"]
    runtime: nvidia
    environment:
      CUDA_VISIBLE_DEVICES: "0"
      LORA_MODEL_ID: runwayml/stable-diffusion-v1-5
      LORA_TORCH_DTYPE: float16
      LORA_DEVICE: cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./wafer-lora-service/loras:/app/loras
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  wafer-qwen-service:
    build: ./wafer-qwen-service
    ports: ["8001:8001"]
    environment:
      QWEN_LLAMA_SERVER_URL: http://llama-server:8002/v1
      QWEN_HOST: "0.0.0.0"
      QWEN_PORT: 8001
    depends_on:
      - llama-server
    restart: unless-stopped

  llama-server:
    image: ghcr.io/ggerganov/llama.cpp:full
    ports: ["8002:8002"]
    volumes:
      - type: bind
        source: /mnt/d/models
        target: /models
    command:
      - --model
      - /models/qwen2.5-vl-7b-instruct-q4_k_m.gguf
      - --port
      - "8002"
      - --host
      - "0.0.0.0"
      - --ctx-size
      - "8192"
      - --batch-size
      - "512"
      - --n-gpu-layers
      - "0"
    restart: unless-stopped

volumes:
  pgdata:
  minio_data:
